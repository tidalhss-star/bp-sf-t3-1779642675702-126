<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="121" cy="226" r="26" fill="#880e4f" opacity="0.05"/>
    <circle cx="959" cy="613" r="30" fill="#880e4f" opacity="0.05"/>
    <circle cx="39" cy="-65" r="87" fill="#880e4f" opacity="0.16"/>
    <circle cx="524" cy="144" r="45" fill="#880e4f" opacity="0.08"/>
    <circle cx="683" cy="615" r="24" fill="#880e4f" opacity="0.20"/>
    <circle cx="195" cy="132" r="99" fill="#880e4f" opacity="0.20"/>
    <rect x="263" y="278" width="90" height="52" rx="8" fill="#b71c1c" opacity="0.04" transform="rotate(11, 241, 227)"/>
    <rect x="628" y="389" width="78" height="91" rx="8" fill="#b71c1c" opacity="0.09" transform="rotate(42, 1220, 321)"/>
    <rect x="781" y="204" width="60" height="39" rx="8" fill="#b71c1c" opacity="0.06" transform="rotate(15, 987, 600)"/>
    <rect x="453" y="711" width="67" height="76" rx="8" fill="#b71c1c" opacity="0.07" transform="rotate(26, -25, 376)"/>
    <rect x="1193" y="340" width="68" height="27" rx="8" fill="#b71c1c" opacity="0.09" transform="rotate(9, 165, 543)"/>
    <rect x="1066" y="375" width="91" height="85" rx="8" fill="#b71c1c" opacity="0.08" transform="rotate(24, 459, 723)"/>
    <rect x="310" y="255" width="91" height="89" rx="8" fill="#b71c1c" opacity="0.03" transform="rotate(30, 520, 88)"/>
    <rect x="413" y="676" width="80" height="82" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(2, 951, 1)"/>
    <polygon points="815,323 897,487 733,487" fill="#880e4f" opacity="0.08"/>
    <polygon points="619,193 655,265 583,265" fill="#880e4f" opacity="0.06"/>
    <polygon points="1085,303 1162,457 1008,457" fill="#880e4f" opacity="0.05"/>
    <polygon points="121,617 189,753 53,753" fill="#880e4f" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,572 C360,601 840,543 1200,572 L1200,630 L0,630Z" fill="#880e4f" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강남 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffd600" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffd600" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 강남 셔츠룸 — 서버 웜업
  </text>
</svg>